<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - UCT Ecommerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <header id="main-header"></header>
    
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            
            <!-- Login -->
            <div class="col-md-5">
                <div class="card p-4 mb-4">
                    <h3 class="mb-4 fw-bold">Iniciar Sesión</h3>
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="loginEmail" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="loginPass" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-uct-primary w-100">Ingresar</button>
                    </form>
                </div>
            </div>

            <!-- Registro -->
            <div class="col-md-5">
                <div class="card p-4 border-primary border-opacity-25">
                    <h3 class="mb-4 fw-bold">Registro</h3>
                    <form id="regForm" onsubmit="handleRegister(event)">
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="regFirst" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Apellido</label>
                                <input type="text" id="regLast" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="regEmail" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="regPass" class="form-control" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-uct-secondary w-100">Registrarme</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
