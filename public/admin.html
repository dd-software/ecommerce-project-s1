<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración - Ecommerce UCT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="loading-spinner" class="d-none text-center mt-5"><div class="spinner-border text-primary" role="status"></div></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-uct">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="./index.html">🛒 Ecommerce UCT <span class="fs-6 fw-light text-warning">| Panel Admin</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="adminNavbar">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" href="./index.html"><i class="bi bi-house-door"></i> Ir a la Tienda</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle text-warning"></i> <span id="user-name">Administrador</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" id="btn-logout"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Layout -->
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-3 col-lg-2 d-md-block admin-sidebar collapse collapse-horizontal" id="sidebarMenu">
      <div class="position-sticky">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link admin-nav-link active" href="#" data-section="dashboard">
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-nav-link" href="#" data-section="productos">
              <i class="bi bi-box-seam"></i> Productos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-nav-link" href="#" data-section="pedidos">
              <i class="bi bi-receipt"></i> Pedidos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-nav-link" href="#" data-section="usuarios">
              <i class="bi bi-people"></i> Usuarios
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-nav-link" href="#" data-section="reportes">
              <i class="bi bi-bar-chart-line"></i> Reportes
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Content Area -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div id="admin-content" class="container-fluid">
        <!-- Contenido dinámico renderizado por admin.js -->
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/catalogo.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    App.init();
    Admin.init();
});
</script>
</body>
</html>
