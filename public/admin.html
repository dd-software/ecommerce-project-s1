<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | UCT Ecommerce</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        :root {
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fa;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .admin-wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--uct-primary);
            color: #fff;
            transition: all 0.3s;
            min-height: 100vh;
            position: fixed;
        }

        #sidebar .sidebar-header {
            padding: 25px;
            background: rgba(0, 0, 0, 0.1);
        }

        #sidebar .sidebar-header h3 {
            font-weight: 800;
            font-size: 1.25rem;
            margin: 0;
            color: #fff;
        }

        #sidebar .sidebar-header h3 span {
            color: var(--uct-accent);
        }

        #sidebar ul.components {
            padding: 20px 0;
        }

        #sidebar ul li a {
            padding: 12px 25px;
            font-size: 0.95rem;
            display: block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        #sidebar ul li a i {
            margin-right: 12px;
            font-size: 1.1rem;
        }

        #sidebar ul li a:hover,
        #sidebar ul li a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--uct-accent);
        }

        /* Content Styling */
        #content {
            width: calc(100% - var(--sidebar-width));
            padding: 40px;
            margin-left: var(--sidebar-width);
            transition: all 0.3s;
        }

        .stat-card {
            border: none;
            border-radius: 16px;
            transition: transform 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .bg-glass-primary {
            background: rgba(0, 51, 102, 0.1);
            color: var(--uct-primary);
        }

        .bg-glass-accent {
            background: rgba(242, 169, 0, 0.1);
            color: var(--uct-accent);
        }

        .bg-glass-success {
            background: rgba(25, 135, 84, 0.1);
            color: var(--uct-success);
        }

        .bg-glass-danger {
            background: rgba(220, 53, 111, 0.1);
            color: var(--uct-danger);
        }

        .table-container {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .breadcrumb-item a {
            color: var(--uct-primary);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            #sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
            }

            #sidebar.active {
                margin-left: 0;
            }

            #content {
                width: 100%;
                margin-left: 0;
            }

            #content.active {
                margin-left: var(--sidebar-width);
            }
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3>UCT<span>Admin</span></h3>
            </div>

            <ul class="list-unstyled components">
                <li>
                    <a href="#" class="admin-nav-link active" data-section="dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="#" class="admin-nav-link" data-section="productos">
                        <i class="bi bi-box-seam"></i> Productos
                    </a>
                </li>
                <li>
                    <a href="#" class="admin-nav-link" data-section="pedidos">
                        <i class="bi bi-cart-check"></i> Pedidos
                    </a>
                </li>
                <li>
                    <a href="#" class="admin-nav-link" data-section="usuarios">
                        <i class="bi bi-people"></i> Usuarios
                    </a>
                </li>
                <li>
                    <a href="#" class="admin-nav-link" data-section="reportes">
                        <i class="bi bi-graph-up"></i> Reportes
                    </a>
                </li>
                <li class="mt-4">
                    <a href="index.html" class="text-info">
                        <i class="bi bi-shop"></i> Ver Tienda
                    </a>
                </li>
                <li>
                    <a href="index.html" id="btn-logout" class="text-danger">
                        <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-transparent mb-4 p-0">
                <div class="container-fluid p-0">
                    <button type="button" id="sidebarCollapse" class="btn btn-outline-primary d-md-none me-3">
                        <i class="bi bi-list"></i>
                    </button>

                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="#">Admin</a></li>
                            <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-current">Dashboard
                            </li>
                        </ol>
                    </nav>

                    <div class="ms-auto d-flex align-items-center">
                        <div class="me-3 text-end d-none d-sm-block">
                            <small class="text-muted d-block" id="admin-user-role">Administrador</small>
                            <span class="fw-bold" id="admin-user-name">Usuario Admin</span>
                        </div>
                        <img src="https://ui-avatars.com/api/?name=Admin&background=003366&color=fff"
                            class="rounded-circle" width="40" height="40" alt="Admin">
                    </div>
                </div>
            </nav>

            <div id="admin-content">
                <!-- Se carga dinámicamente por admin.js -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Admin.init();

            // Toggle Sidebar Móvil
            const sidebarCollapse = document.getElementById('sidebarCollapse');
            if (sidebarCollapse) {
                sidebarCollapse.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('active');
                    document.getElementById('content').classList.toggle('active');
                });
            }

            // Actualizar nombre de usuario
            if (App.user) {
                document.getElementById('admin-user-name').textContent = App.user.nombre || App.user.email;
                document.getElementById('admin-user-role').textContent = App.user.rol.toUpperCase();
            }
        });
    </script>
</body>

</html>
