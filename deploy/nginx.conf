# QuadCore — configuración nginx para producción.
#
# TLS lo termina Cloudflare (Tunnel o proxy); nginx sirve HTTP en local.
# Instalar:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/quadcore
#   sudo ln -s /etc/nginx/sites-available/quadcore /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTA: nginx NO lee .htaccess. Los headers de seguridad que ese archivo
# define para Apache se replican acá; si tocás uno, tocá el otro.

server {
    listen 80;
    server_name quadcorestore.com www.quadcorestore.com;

    root /var/www/quadcore/public;
    index index.html;

    # --- Headers de seguridad (equivalentes a public/.htaccess) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com https://plus.unsplash.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; frame-src https://www.openstreetmap.org" always;

    # API → front controller PHP
    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Estáticos directo; cualquier otra ruta → SPA (index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No exponer diagnósticos ni dotfiles
    location = /setup.php { deny all; return 404; }
    location ~ /\.(?!well-known) { deny all; }
}
