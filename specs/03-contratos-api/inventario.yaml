openapi: 3.0.0
info:
  title: API Inventario
  description: Contrato para verificar y actualizar el stock de productos.
  version: 1.0.0
servers:
  - url: http://localhost:8086
    description: Microservicio de Inventario
paths:
  /api/inventario:
    get:
      summary: Verificar disponibilidad de stock para múltiples productos
      tags:
        - Inventario
      parameters:
        - name: productoIds
          in: query
          required: true
          schema:
            type: string
          example: "prod-123,prod-456"
          description: Lista de IDs de productos separados por coma.
      responses:
        '200':
          description: Disponibilidad consultada.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    productoId:
                      type: string
                      example: "prod-123"
                    disponible:
                      type: boolean
                      example: true
                    stockActual:
                      type: integer
                      example: 45