<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear cuenta — MiTienda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-bag-heart-fill me-1"></i>MiTienda</a>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="card border-0 shadow-sm rounded-xl" style="width:100%;max-width:440px">
    <div class="card-body p-4 p-md-5">
      <h4 class="fw-bold mb-1">Crear cuenta</h4>
      <p class="text-muted mb-4">Es gratis y solo toma un momento</p>

      <div id="alert-box" class="alert alert-danger d-none"></div>

      <form id="registro-form">
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" id="nombre" class="form-control" placeholder="Juan Pérez" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
            <button type="button" class="btn btn-outline-secondary"
                    onclick="const i=document.getElementById('password');i.type=i.type==='password'?'text':'password'">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" id="btn-registro" class="btn btn-primary w-100">
          Crear cuenta
        </button>
      </form>

      <p class="text-center text-muted mt-4 mb-0">
        ¿Ya tienes cuenta? <a href="login.html" class="fw-semibold">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (isLoggedIn()) window.location.href = APP_BASE + '/index.html';

  document.getElementById('registro-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('btn-registro');
    const alert = document.getElementById('alert-box');
    alert.classList.add('d-none');
    setLoading(btn, true);

    try {
      const data = await apiFetch('/auth/registro', {
        method: 'POST',
        body: JSON.stringify({
          nombre:   document.getElementById('nombre').value,
          email:    document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.usuario));
      showToast('¡Cuenta creada exitosamente!');
      setTimeout(() => window.location.href = APP_BASE + '/index.html', 800);
    } catch (err) {
      alert.textContent = err.mensaje || 'Error al crear la cuenta.';
      alert.classList.remove('d-none');
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
