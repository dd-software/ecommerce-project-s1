<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — MiTienda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-bag-heart-fill me-1"></i>MiTienda</a>
    <a class="nav-link text-muted" href="carrito.html"><i class="bi bi-arrow-left me-1"></i>Volver al carrito</a>
  </div>
</nav>

<!-- Progress -->
<div class="bg-white border-bottom py-2">
  <div class="container">
    <div class="d-flex justify-content-center gap-4 small fw-semibold">
      <span class="text-muted"><span class="badge bg-secondary rounded-circle me-1">1</span>Carrito</span>
      <span class="text-primary"><span class="badge bg-primary rounded-circle me-1">2</span>Confirmar</span>
      <span class="text-muted"><span class="badge bg-secondary rounded-circle me-1">3</span>Listo</span>
    </div>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4 justify-content-center">
    <!-- Resumen de productos -->
    <div class="col-md-7">
      <div class="card border-0 shadow-sm rounded-xl">
        <div class="card-body">
          <h5 class="card-title fw-bold mb-3">
            <i class="bi bi-bag-check me-1"></i>Resumen del pedido
          </h5>
          <div id="checkout-items">
            <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>
          </div>
        </div>
      </div>

      <!-- Pago simulado -->
      <div class="card border-0 shadow-sm rounded-xl mt-3">
        <div class="card-body">
          <h5 class="card-title fw-bold mb-3"><i class="bi bi-credit-card me-1"></i>Método de pago</h5>
          <div class="alert alert-info d-flex align-items-center gap-2 mb-0">
            <i class="bi bi-info-circle-fill"></i>
            <div><strong>Modo Beta:</strong> El pago se procesa automáticamente al confirmar. No se requiere tarjeta real.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Total y confirmar -->
    <div class="col-md-5">
      <div class="card border-0 shadow-sm rounded-xl">
        <div class="card-body">
          <h5 class="card-title fw-bold mb-3">Total a pagar</h5>
          <div id="checkout-resumen">
            <div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary"></div></div>
          </div>
          <hr>
          <button id="btn-confirmar" class="btn btn-success w-100 py-2 fw-semibold">
            <i class="bi bi-lock-fill me-1"></i>Confirmar y pagar
          </button>
          <a href="carrito.html" class="btn btn-outline-secondary w-100 mt-2">
            <i class="bi bi-arrow-left me-1"></i>Editar carrito
          </a>
          <p class="text-muted small text-center mt-3 mb-0">
            <i class="bi bi-shield-check me-1 text-success"></i>Transacción segura
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
