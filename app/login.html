<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — MiTienda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-bag-heart-fill me-1"></i>MiTienda</a>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height:85vh">
  <div class="card border-0 shadow-sm rounded-xl" style="width:100%;max-width:440px">
    <div class="card-body p-4 p-md-5">
      <h4 class="fw-bold mb-1">Bienvenido</h4>
      <p class="text-muted mb-4">Inicia sesión en tu cuenta</p>

      <div id="alert-box" class="alert alert-danger d-none" role="alert"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="tu@email.com" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            <button type="button" class="btn btn-outline-secondary"
                    onclick="togglePass('password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" id="btn-login" class="btn btn-primary w-100">
          Iniciar sesión
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        ¿No tienes cuenta? <a href="registro.html" class="fw-semibold">Regístrate</a>
      </p>

      <!-- Credenciales de prueba -->
      <div class="mt-4 p-3 bg-light rounded">
        <p class="small text-muted mb-2 fw-semibold">Credenciales de prueba:</p>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-sm btn-outline-secondary"
                  onclick="fillCreds('admin@ecommerce.com','Admin123!')">
            <i class="bi bi-shield-lock me-1"></i>Admin
          </button>
          <button class="btn btn-sm btn-outline-secondary"
                  onclick="fillCreds('cliente@ecommerce.com','Cliente123!')">
            <i class="bi bi-person me-1"></i>Cliente
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (isLoggedIn()) window.location.href = APP_BASE + '/index.html';

  function fillCreds(email, pass) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pass;
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    input.type  = input.type === 'password' ? 'text' : 'password';
    btn.querySelector('i').className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('btn-login');
    const alert = document.getElementById('alert-box');
    alert.classList.add('d-none');
    setLoading(btn, true);

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email:    document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.usuario));

      const redirect = new URLSearchParams(window.location.search).get('redirect') || APP_BASE + '/index.html';
      window.location.href = data.usuario.rol === 'administrador' ? APP_BASE + '/admin/' : redirect;
    } catch (err) {
      alert.textContent = err.mensaje || 'Error al iniciar sesión.';
      alert.classList.remove('d-none');
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
